; ─────────────────────────────────────────────────────────
; Dirk's LED Controller V2 — PlatformIO Build Override
; Hardware: Gledopto Elite 4D EXMU 618WL (ESP32)
; LED:      WS2814 RGBW · SK6812-Modus · 24V
; ─────────────────────────────────────────────────────────

[platformio]
default_envs = esp32dev

[env:esp32dev]
; ── Build flags ───────────────────────────────────────────
build_flags =
  ${common.build_flags_esp32}
  -D USERMOD_STAIR_CONTROLLER          ; activates our plugin
  -D USERMOD_AUDIOREACTIVE             ; built-in mic support
  -D WLED_AP_SSID=\"Dirks-LED-V2\"
  -D WLED_AP_PASS=\"dirksled2\"
  -D SERVERNAME=\"treppen-led\"
  ; -D WLED_DISABLE_ALEXA             ; uncomment to save flash
  ; -D WLED_DISABLE_MQTT              ; uncomment to save flash

; ── Custom usermod path ───────────────────────────────────
; This tells PlatformIO to look for usermods in our folder
lib_extra_dirs =
  usermods
